services:
  - type: web
    name: wealthvibe-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wealthvibe-db
          property: connectionString

databases:
  - name: wealthvibe-db
    plan: free
    databaseName: wealthvibe
    user: wealthvibe
